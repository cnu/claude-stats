version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/claude-stats
    binary: claude-stats
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/cnu/claude-stats/internal/cli.Version={{.Version}}
      - -X github.com/cnu/claude-stats/internal/cli.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge"
  groups:
    - title: Features
      regexp: "^.*feat.*$"
    - title: Bug Fixes
      regexp: "^.*fix.*$"
    - title: Documentation
      regexp: "^.*docs.*$"
    - title: Tests
      regexp: "^.*test.*$"
    - title: Chores
      regexp: "^.*chore.*$"
    - title: CI
      regexp: "^.*ci.*$"
    - title: Other
      order: 999

homebrew_casks:
  - repository:
      owner: cnu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/cnu/claude-stats
    description: Analytics for Claude Code usage - parse JSONL session files into SQLite
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/claude-stats"]
          end
    skip_upload: auto
